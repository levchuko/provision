- name: Check firmware version
  hosts: all
  gather_facts: false

  tasks:
    - name: Read firmware version
      shell: |
        system_profiler SPHardwareDataType | grep "System Firmware Version" | sed -E 's/^[^:]+: ([^ ]+).*/\1/'
      register: fw
      changed_when: false

    - name: Firmware needs update
      debug:
        msg: "Firmware update required. Current: {{ fw.stdout | trim }}, Expected: {{ expected_firmware_version }}"
      when: fw.stdout | trim != expected_firmware_version

    - name: Run firmware update script
      shell: echo "Would be running update firmware script here!!!"
      when: fw.stdout | trim != expected_firmware_version

    - name: Firmware is up to date
      debug:
        msg: "Firmware {{ fw.stdout | trim }} is already up to date"
      when: fw.stdout | trim == expected_firmware_version
