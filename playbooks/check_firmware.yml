- name: Check firmware version
  hosts: all
  gather_facts: false

  tasks:
    - name: Read firmware version
      shell: |
        system_profiler SPHardwareDataType | grep "System Firmware Version" | sed -E 's/^[^:]+: ([^ ]+).*/\1/'
      register: fw
      changed_when: false

    - name: Verify firmware version
      fail:
        msg: "Firmware mismatch. Current: {{ fw.stdout }}, Expected: {{ expected_firmware_version }}"
      when: fw.stdout != expected_firmware_version

    - name: Firmware is up to date
      debug:
        msg: "Firmware {{ fw.stdout }} is up to date"
